name: Check results

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: results
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Check
        env:
          UNI_USERNAME: ${{ secrets.UNI_USERNAME }}
          UNI_PASSWORD: ${{ secrets.UNI_PASSWORD }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: bun run check

      - name: Commit updated state (if changed)
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            exit 0
          fi
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add state.json
          git commit -m "Update exam state"
          git push
